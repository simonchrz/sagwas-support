<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SagWas – Geteilte Aufnahme</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 48px 36px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        .icon {
            width: 80px; height: 80px;
            background: #e74c3c;
            border-radius: 20px;
            display: inline-flex;
            align-items: center; justify-content: center;
            margin-bottom: 20px;
        }
        .icon svg { width: 40px; height: 40px; fill: white; }
        h1 { font-size: 26px; margin-bottom: 8px; }
        .share-id {
            font-family: ui-monospace, 'SF Mono', Menlo, monospace;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 6px;
            color: #e74c3c;
            margin: 20px 0;
        }
        p { color: #555; font-size: 15px; line-height: 1.6; margin-bottom: 16px; }
        .btn {
            display: inline-block;
            background: #007AFF;
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            margin-top: 8px;
        }
        .btn:hover { opacity: 0.85; }
        .btn-secondary {
            display: inline-block;
            color: #007AFF;
            text-decoration: none;
            font-size: 15px;
            margin-top: 14px;
        }
        .steps {
            text-align: left;
            margin: 20px 0;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 18px 22px;
        }
        .steps li {
            color: #444;
            font-size: 14px;
            line-height: 1.7;
            margin-left: 16px;
        }
    </style>
    <script>
        const params = new URLSearchParams(window.location.search);
        const shareID = params.get('id') || '';

        if (shareID && /iP(hone|ad|od)/.test(navigator.userAgent)) {
            window.location = 'sagwas://share?id=' + encodeURIComponent(shareID);
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (shareID) {
                document.getElementById('share-id').textContent = shareID.toUpperCase();
                document.getElementById('open-btn').href = 'sagwas://share?id=' + encodeURIComponent(shareID);
            } else {
                document.getElementById('share-id').textContent = '------';
            }
        });
    </script>
</head>
<body>
    <div class="card">
        <div class="icon">
            <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zm0 18c-3.87 0-7-3.13-7-7H3c0 4.72 3.51 8.59 8 9.29V23h2v-1.71c4.49-.7 8-4.57 8-9.29h-2c0 3.87-3.13 7-7 7z"/></svg>
        </div>
        <h1>SagWas</h1>
        <p>Jemand teilt eine Aufnahme mit dir!</p>
        <div class="share-id" id="share-id">------</div>
        <a id="open-btn" href="sagwas://share" class="btn">In SagWas öffnen</a>
        <br>
        <a href="https://apps.apple.com/app/sagwas/id6761471285" class="btn-secondary">App im App Store laden</a>
        <ol class="steps">
            <li>SagWas installieren oder öffnen</li>
            <li>Einstellungen &rarr; ShareID eingeben</li>
            <li>Die geteilte Aufnahme wird importiert</li>
        </ol>
    </div>
</body>
</html>
